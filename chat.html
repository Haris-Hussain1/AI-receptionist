<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Receptionist</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1f2933, #050810 55%);
        color: #e5e7eb;
      }

      .chat-container {
        width: min(480px, 95vw);
        display: flex;
        flex-direction: column;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(75, 85, 99, 0.6);
        background: #0b1120;
      }

      .chat-header {
        padding: 1rem 1.25rem;
        background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(15,23,42,0.7));
        border-bottom: 1px solid rgba(75, 85, 99, 0.4);
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }

      .chat-header .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #38bdf8, #6366f1 60%, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        box-shadow: 0 0 18px rgba(56, 189, 248, 0.4);
        flex-shrink: 0;
      }

      .chat-header .title { font-size: 1rem; font-weight: 600; }
      .chat-header .subtitle { font-size: 0.72rem; color: #9ca3af; }

      #chat-box {
        height: 420px;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        scrollbar-width: thin;
        scrollbar-color: rgba(75,85,99,0.5) transparent;
        background: #020617;
      }

      .msg {
        display: flex;
        max-width: 80%;
      }

      .msg.user  { align-self: flex-end; }
      .msg.ai    { align-self: flex-start; }

      .bubble {
        padding: 0.55rem 0.85rem;
        border-radius: 14px;
        font-size: 0.88rem;
        line-height: 1.45;
        word-break: break-word;
      }

      .msg.user .bubble {
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: #020617;
        border-bottom-right-radius: 3px;
      }

      .msg.ai .bubble {
        background: #111827;
        border: 1px solid rgba(55, 65, 81, 0.8);
        border-bottom-left-radius: 3px;
        color: #e5e7eb;
      }

      .msg.ai.typing .bubble { color: #6b7280; font-style: italic; }
      .msg.error .bubble { color: #f87171; border-color: rgba(248,113,113,0.3); }

      .chat-input-row {
        display: flex;
        gap: 0.6rem;
        padding: 0.85rem 1rem;
        border-top: 1px solid rgba(31, 41, 55, 0.9);
        background: #0b1120;
      }

      #user-input {
        flex: 1;
        border-radius: 999px;
        border: 1px solid rgba(75, 85, 99, 0.7);
        padding: 0.6rem 1rem;
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        font-size: 0.88rem;
        outline: none;
        transition: border-color 0.15s;
      }

      #user-input:focus { border-color: #38bdf8; box-shadow: 0 0 0 1px rgba(56,189,248,0.35); }

      #send-btn {
        border: none;
        border-radius: 999px;
        padding: 0.6rem 1.1rem;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: #020617;
        transition: opacity 0.15s, transform 0.08s;
      }

      #send-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
      #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="avatar">◎</div>
        <div>
          <div class="title">AI Receptionist</div>
          <div class="subtitle">Powered by Groq LLaMA 3</div>
        </div>
      </div>

      <div id="chat-box"></div>

      <div class="chat-input-row">
        <input
          id="user-input"
          type="text"
          placeholder="Ask a question or say hello…"
          autocomplete="off"
        />
        <button id="send-btn">Send</button>
      </div>
    </div>

    <script>
      const chatBox   = document.getElementById("chat-box");
      const input     = document.getElementById("user-input");
      const sendBtn   = document.getElementById("send-btn");

      function addMessage(role, text, extra = "") {
        const wrap = document.createElement("div");
        wrap.className = `msg ${role} ${extra}`.trim();
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        wrap.appendChild(bubble);
        chatBox.appendChild(wrap);
        chatBox.scrollTop = chatBox.scrollHeight;
        return wrap;
      }

      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage("user", text);
        input.value = "";
        sendBtn.disabled = true;

        const typing = addMessage("ai", "AI is typing…", "typing");

        try {
          const resp = await fetch("http://127.0.0.1:5000/api/chat/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${localStorage.getItem("token") || ""}`,
            },
            body: JSON.stringify({ message: text }),
          });

          const data = await resp.json();

          typing.remove();

          if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

          addMessage("ai", data?.data?.reply || "(no reply)");
        } catch {
          typing.remove();
          addMessage("ai", "Server error. Please try again.", "error");
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      }

      sendBtn.addEventListener("click", sendMessage);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

      // Greeting
      addMessage("ai", "Hi! I'm your AI receptionist. How can I help you today?");
    </script>
  </body>
</html>
